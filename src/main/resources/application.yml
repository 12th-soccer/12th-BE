spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  security:
    oauth2:
      client:
        registration:
           google:
             client-id: ${GOOGLE_CLIENT_ID}
             client-secret: ${GOOGLE_CLIENT_SECRET}
             redirect-uri: ${REDIRECT_URI}
             scope:
               - openid
               - profile
               - email

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_EMAIL}
    password: ${GOOGLE_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-exp: 3600000      # 1시간 (밀리초)
  refresh-exp: 1209600000  # 14일
  header: Authorization
  prefix: Bearer

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  config-path: ${FIREBASE_CONFIG_PATH:}

api:
  football:
    key: ${API_FOOTBALL_KEY}

server:
  forward-headers-strategy: framework

solapi:
  api-key: ${SOLAPI_API_KEY}
  api-secret: ${SOLAPI_API_SECRET}
  sender: ${SOLAPI_SENDER}
